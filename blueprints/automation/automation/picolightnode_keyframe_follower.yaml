blueprint:
  name: "PICOlightnode: Keyframe Scheduler Follower v4.0"
  description: >
    Applies Keyframe Scheduler outputs to a PICOlightnode target using automation override channel.
    
    **OPTIMIZED FOR:**
    - Keyframe Scheduler Component v2.6.0+
    - PICOlightnode v1.0.0+ (TC and BRIGHTNESS targets)
    
    **NEW in v4.0: Space-Aware!**
    - Auto-detects TC vs BRIGHTNESS targets
    - Sends correct MQTT payload (with/without Kelvin)
    - Works with both target types seamlessly
    
    **NEW in v3.0: Simplified Configuration!**
    - Select ONE Keyframe Scheduler sensor (DIM or CCT)
    - Automatically detects the companion sensor
    - No need to manually select both sensors!
    - No need to set default values (reads from light state)
    
    **Features:**
    - Uses PICOlightnode automation service (respects manual override)
    - Triggers every minute AND on sensor state changes
    - **Smooth sync when Follow External switch is turned ON (3s transition)**
    - **Auto-disables Follow External on manual override (context-based detection)**
    - Robust: Handles missing/unavailable sensors gracefully
    - DIM accepts 0..100 or 0..1 (auto scaled)
    - Reads transition_seconds from Keyframe Scheduler sensor attributes
    
    **Manual Override Detection:**
    Uses Home Assistant context tracking (user_id/parent_id) to detect manual control.
    When user changes light via UI/App, Follow External is automatically disabled.
    
    **No Additional Automations Required!**
    All functionality in one blueprint:
    - Keyframe value application
    - Smooth sync on enable
    - Manual override detection (HA-based, not firmware)
    
    Pair with "Follow External Auto-Resume" blueprint for complete automation cycle.
    
  domain: automation
  
  input:
    pico_light:
      name: PICOlightnode Light Entity
      description: The PICOlightnode light entity to control
      selector:
        entity:
          domain: light
          integration: picolightnode
    
    follow_switch:
      name: Follow External Automation Switch (Optional)
      description: If provided, enables smooth sync on enable and auto-disable on manual override
      default: ""
      selector:
        entity:
          domain: switch
          integration: picolightnode
    
    keyframe_sensor:
      name: Keyframe Scheduler Sensor
      description: >
        Select ANY sensor from your Keyframe Scheduler (DIM or CCT).
        The blueprint will automatically find the companion sensor.
        
        Examples:
        - Select sensor.my_keyframe_cct → automatically finds sensor.my_keyframe_dim
        - Select sensor.my_keyframe_dim → automatically finds sensor.my_keyframe_cct
      selector:
        entity:
          domain: sensor
          integration: keyframe_scheduler
    
    apply_dim:
      name: Apply Brightness
      description: Apply brightness values from Keyframe Scheduler
      default: true
      selector:
        boolean: {}
    
    apply_kelvin:
      name: Apply Color Temperature
      description: Apply Kelvin values from Keyframe Scheduler
      default: true
      selector:
        boolean: {}

mode: restart
max_exceeded: silent

trigger:
  # Periodic update (every minute) ensures values are applied even if sensors don't change
  - platform: time_pattern
    minutes: "/1"
    id: periodic
  
  # React to Keyframe Scheduler sensor changes for immediate updates
  # Note: We monitor the selected sensor directly, and the automation will
  # read both DIM and CCT from the auto-detected sensors
  - platform: state
    entity_id: !input keyframe_sensor
    id: keyframe_change
  
  # React to Follow External switch being turned ON (smooth sync)
  - platform: state
    entity_id: !input follow_switch
    to: "on"
    id: follow_enabled
  
  # Detect manual override via context tracking (HA-based, not firmware)
  # Triggers when light brightness or color temp changes via user control
  - platform: state
    entity_id: !input pico_light
    attribute: brightness
    id: brightness_changed
  
  - platform: state
    entity_id: !input pico_light
    attribute: color_temp_kelvin
    id: cct_changed

variables:
  pico_light: !input pico_light
  follow_switch: !input follow_switch
  keyframe_sensor: !input keyframe_sensor
  apply_dim: !input apply_dim
  apply_kelvin: !input apply_kelvin
  
  # Auto-detect companion sensors
  # If user selects sensor.my_keyframe_cct → find sensor.my_keyframe_dim
  # If user selects sensor.my_keyframe_dim → find sensor.my_keyframe_cct
  sensor_base: >-
    {% set entity = keyframe_sensor %}
    {% if '_cct' in entity %}
      {{ entity.replace('_cct', '') }}
    {% elif '_dim' in entity %}
      {{ entity.replace('_dim', '') }}
    {% else %}
      {{ entity }}
    {% endif %}
  
  dim_entity: "{{ sensor_base + '_dim' }}"
  kelvin_entity: "{{ sensor_base + '_cct' }}"
  
  # Detect target space type by checking supported_color_modes
  # TC targets support 'color_temp', BRIGHTNESS targets only support 'brightness'
  supported_modes: "{{ state_attr(pico_light, 'supported_color_modes') | list }}"
  is_tc_target: "{{ 'color_temp' in supported_modes }}"
  
  # Current light values (fallback if sensors are missing)
  cur_brightness: "{{ state_attr(pico_light, 'brightness') }}"
  cur_kelvin: "{{ state_attr(pico_light, 'color_temp_kelvin') }}"
  
  # Defaults from current light state
  default_kelvin: "{{ cur_kelvin if cur_kelvin is not none else 3000 }}"
  default_fade_seconds: 0
  
  # Read sensor states
  dim_state: "{{ states(dim_entity) }}"
  kelvin_state: "{{ states(kelvin_entity) }}"
  
  # Validate sensor states
  dim_valid: "{{ dim_state not in ['unknown','unavailable','none','None',''] }}"
  kelvin_valid: "{{ kelvin_state not in ['unknown','unavailable','none','None',''] }}"
  
  # DIM → Brightness (0-255)
  # Supports 0..1 or 0..100 input, auto-scales
  brightness_out: >-
    {% if not apply_dim %}
      {{ cur_brightness if cur_brightness is not none else 255 }}
    {% elif dim_valid %}
      {% set raw = dim_state | float %}
      {% set pct = (raw * 100) if raw <= 1 else raw %}
      {% set d = pct %}
      {% if d < 0 %}{% set d = 0 %}{% endif %}
      {% if d > 100 %}{% set d = 100 %}{% endif %}
      {{ (d * 2.55) | round(0) | int }}
    {% else %}
      {{ cur_brightness if cur_brightness is not none else 255 }}
    {% endif %}
  
  # Temperature → Kelvin (direct from sensor, no conversion needed)
  kelvin_out: >-
    {% if not apply_kelvin %}
      {{ cur_kelvin if cur_kelvin is not none else (default_kelvin | int) }}
    {% elif kelvin_valid %}
      {{ kelvin_state | round(0) | int }}
    {% else %}
      {{ cur_kelvin if cur_kelvin is not none else (default_kelvin | int) }}
    {% endif %}
  
  # Fade/Transition from Keyframe Scheduler sensor attribute
  # Keyframe Scheduler Component v2.6.0+ sets 'transition_seconds' attribute
  fade_attr: >-
    {% set entity = kelvin_entity %}
    {% set f = state_attr(entity, 'transition_seconds') %}
    {% if f is not none %}
      {{ f }}
    {% else %}
      {# Fallback: try other common attribute names #}
      {% set f = state_attr(entity, 'fade_seconds') %}
      {% if f is not none %}
        {{ f }}
      {% else %}
        {% set f = state_attr(entity, 'fadeSeconds') %}
        {% if f is not none %}
          {{ f }}
        {% else %}
          {{ state_attr(entity, 'transitionSeconds') }}
        {% endif %}
      {% endif %}
    {% endif %}
  
  fade_out: "{{ (fade_attr if fade_attr is not none else default_fade_seconds) | float }}"
  
  # Override fade to 3 seconds when Follow External is turned ON (smooth sync)
  fade_final: >-
    {% if trigger.id == 'follow_enabled' %}
      3.0
    {% else %}
      {{ fade_out }}
    {% endif %}

action:
  - choose:
      # CASE 1: Manual override detected via context tracking
      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['brightness_changed', 'cct_changed'] }}"
          - condition: template
            value_template: >
              {% set has_user = trigger.to_state.context.user_id is not none %}
              {% set has_parent = trigger.to_state.context.parent_id is not none %}
              {{ has_user and not has_parent }}
          - condition: template
            value_template: "{{ follow_switch != '' }}"
          - condition: state
            entity_id: !input follow_switch
            state: "on"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: "{{ follow_switch }}"
    default:
      # CASE 2: Normal updates (apply keyframe values)
      - choose:
          # TC Target: Send brightness + kelvin
          - conditions:
              - condition: template
                value_template: "{{ is_tc_target }}"
            sequence:
              - service: picolightnode.apply_automation_point
                data:
                  entity_id: "{{ pico_light }}"
                  brightness: "{{ brightness_out }}"
                  color_temp_kelvin: "{{ kelvin_out }}"
                  transition: "{{ fade_final }}"
        default:
          # BRIGHTNESS Target: Send brightness only (no kelvin)
          - service: picolightnode.apply_automation_point
            data:
              entity_id: "{{ pico_light }}"
              brightness: "{{ brightness_out }}"
              transition: "{{ fade_final }}"
