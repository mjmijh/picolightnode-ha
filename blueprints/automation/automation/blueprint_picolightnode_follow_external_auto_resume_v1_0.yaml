blueprint:
  name: "PICOlightnode Follow External – Auto Resume v1.0"
  description: >
    Automatically re-enables "Follow External Automation" after manual override.
    
    **How it works:**
    - Monitors the "Follow External" switch for each PICOlightnode target
    - When switch is turned OFF (manual override active), waits specified time
    - Automatically turns switch back ON (re-enables automation)
    
    **Use Case:**
    User manually adjusts light → automation paused → after X minutes → automation resumes
    
    **No Helper Entities Required!**
    Uses the built-in PICOlightnode "Follow External Automation" switch.
    
  domain: automation
  
  input:
    follow_switch:
      name: Follow External Automation Switch
      description: The PICOlightnode "Follow External" switch entity
      selector:
        entity:
          domain: switch
          integration: picolightnode
    
    resume_delay_minutes:
      name: Resume Delay (Minutes)
      description: How long to wait before re-enabling automation
      default: 10
      selector:
        number:
          min: 0
          max: 240
          mode: box

mode: restart
max_exceeded: silent

trigger:
  # Trigger when Follow External switch is turned OFF
  - platform: state
    entity_id: !input follow_switch
    to: "off"

action:
  # Wait specified time
  - delay:
      minutes: !input resume_delay_minutes
  
  # Re-enable automation by turning Follow External back ON
  - service: switch.turn_on
    target:
      entity_id: !input follow_switch
